{% extends 'base.html' %}

{% block title %}Delete Contact - Contact Manager{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 mx-auto">
        <div class="card">
            <div class="card-body">
                <h2 class="card-title text-center page-header">Delete Contact</h2>
                <p class="text-center">Are you sure you want to delete the contact:</p>
                <p class="text-center"><strong>{{ contact.name }} {{ contact.last_name }}</strong>?</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center">
                        <button type="submit" class="btn btn-danger mr-2">Yes, Delete</button>
                        <a href="{% url 'contact_list' %}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
